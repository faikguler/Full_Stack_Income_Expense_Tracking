<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Income-Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Income-Expense Tracker</h1>
        <nav>
            <a href="/" id="homeLink">Home</a>
            <a href="/dashboard.html">Dashboard</a>
            <a href="#" id="logoutLink">Logout</a>
        </nav>
    </header>
    <main>
        <h2>Transactions</h2>

        <div class="summary-cards">
            <div class="summary-card income">
                <h4>Total Income</h4>
                <div class="value"> £<span id="totalIncome">0</span></div>
            </div>
            <div class="summary-card expense">
                <h4>Total Expense</h4>
                <div class="value">£<span id="totalExpense">0</span></div>
            </div>
            <div class="summary-card balance">
                <h4>Balance</h4>
                <div class="value">£<span id="balance">0</span></div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label for="filterType">Type</label>
                <select id="filterType">
                    <option value="">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterCategory">Category</label>
                <select id="filterCategory">
                    <option value="">All</option>
                </select>
            </div>
            <button id="applyFilter">Apply Filter</button>
        </div>

        <div class="table-container">
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>

        <h3>Add New Transaction</h3>
        <form id="transactionForm">
            <label for="description">Description:</label>
            <input type="text" id="description" required>
            <label for="amount">Amount:</label>
            <input type="number" step="0.01" id="amount" required>
            <label for="type">Type:</label>
            <select id="type" required>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <label for="date">Date:</label>
            <input type="date" id="date" required>
            <label for="category_id">Category:</label>
            <select id="category_id" required></select>
            <button type="submit">Add Transaction</button>
        </form>

        <!-- Edit Modal -->
        <div id="editModal" class="modal-overlay">
            <div class="modal-content">
                <h3>Edit Transaction</h3>
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <label for="editDescription">Description:</label>
                    <input type="text" id="editDescription" required>
                    <label for="editAmount">Amount:</label>
                    <input type="number" step="0.01" id="editAmount" required>
                    <label for="editType">Type:</label>
                    <select id="editType" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <label for="editDate">Date:</label>
                    <input type="date" id="editDate" required>
                    <label for="editCategory">Category:</label>
                    <select id="editCategory" required></select>
                    <div style="display: flex; justify-content: flex-end; margin-top: 1.5rem;">
                        <button type="submit">Update</button>
                        <button type="button" class="secondary" onclick="closeEditModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer>
        © 2026 <a href="http://www.faikguler.com" target="_blank">Faik Ramadan</a>
    </footer>     
    <script src="app.js"></script>
</body>
</html>
